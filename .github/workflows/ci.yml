name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Give permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew test

      - name: JaCoCo report
        run: ./gradlew jacocoTestReport

      - name: PIT mutation test
        run: ./gradlew pitest

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: build/reports/